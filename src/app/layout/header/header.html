<header class="header-bar">
  <h2 class="header-title">CarbonMonitor</h2>

  <div class="header-user">
    @if (auth.currentUser()) {
      <a routerLink="/profile" class="header-profile">
        <span class="header-avatar">{{ auth.currentUser()!.name.charAt(0) }}</span>
        <div class="header-user-info">
          <span class="header-user-name">{{ auth.currentUser()!.name }}</span>
          <span class="header-user-email">{{ auth.currentUser()!.email }}</span>
        </div>
      </a>
      <button (click)="auth.logout()" class="header-logout" title="Se déconnecter" type="button">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
      </button>
    }
  </div>
</header>
